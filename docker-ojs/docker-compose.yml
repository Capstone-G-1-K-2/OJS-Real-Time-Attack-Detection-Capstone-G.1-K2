networks:
  inside:
    external: false

services:
  db:
    image: mariadb:11.4
    ports:
      - "3307:3306"
    env_file:
      - .env
    container_name: "ojs_db_${COMPOSE_PROJECT_NAME:-demo}"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-ojsPwd}"
      MYSQL_DATABASE: "${OJS_DB_NAME:-ojs}"
      MYSQL_USER: "${OJS_DB_USER:-ojs}"
      MYSQL_PASSWORD: "${OJS_DB_PASSWORD:-ojsPwd}"
    volumes:
      - ./volumes/db:/var/lib/mysql
      - ./volumes/db-import:/docker-entrypoint-initdb.d
#      - ./volumes/logs/db:/var/log/mysql
#      - ./volumes/config/db.charset.conf:/etc/mysql/conf.d/charset.cnf
    networks:
      - inside
    restart: unless-stopped

  ojs:
    image: "pkpofficial/${OJS_IMAGE:-ojs}:${OJS_VERSION:-latest}"
#    env_file:
#      - .env
    container_name: "ojs_app_${COMPOSE_PROJECT_NAME:-demo}"
    hostname: "${COMPOSE_PROJECT_NAME:-demo}"
    ports:
      - "${HTTP_PORT:-8081}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - /etc/localtime:/etc/localtime
      - ./volumes/private:/var/www/files
      - ./volumes/public:/var/www/html/public
      - ./volumes/logs/app:/var/log/apache2
#      # WARNING: You can only enable file-volumes if file exists in the container.
      - ./volumes/config/ojs.config.inc.php:/var/www/html/config.inc.php
#      - ./volumes/config/apache.htaccess:/var/www/html/.htaccess
#      - ./volumes/php.custom.ini:/usr/local/etc/php/conf.d/custom.ini

    networks:
      - inside
    depends_on:
      - db
    restart: unless-stopped

  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: ojs_waf

    ports:
      - "8080:8080"

    environment:
      PROXY: "1"
      BACKEND: "http://ojs:80"

      PARANOIA: "1"
      ANOMALY_INBOUND: "5"
      ANOMALY_OUTBOUND: "4"

      SERVER_NAME: localhost
      PORT: "8080"

      PROXY_SSL: "off"
      REAL_IP_HEADER: "X-Forwarded-For"
      PROXY_PRESERVE_HOST: "on"

      MODSEC_RULE_ENGINE: "DetectionOnly"

      MODSEC_AUDIT_ENGINE: "On"
      MODSEC_AUDIT_LOG_RELEVANT_STATUS: ".*"
      MODSEC_AUDIT_LOG: "/var/log/modsecurity/audit.log"
      MODSEC_AUDIT_LOG_FORMAT: "JSON"
      MODSEC_AUDIT_LOG_PARTS: "ABIJDEFHZ"

      MODSEC_DEBUG_LOG: "/var/log/modsecurity/debug.log"
      MODSEC_DEBUG_LOGLEVEL: "3"

    volumes:
      - ./volumes/logs/modsecurity:/var/log/modsecurity
      - ./volumes/config/waf/proxy_backend.conf.template:/etc/nginx/templates/includes/proxy_backend.conf.template
      - ./volumes/logs/nginx:/var/log/nginx
      - ./volumes/config/waf/exclusions.conf:/etc/modsecurity.d/owasp-crs/rules/ZZZZZ-exclusions.conf

    depends_on:
      - ojs

    networks:
      - inside

    restart: unless-stopped

  inference:
    build:
      context: ..
      dockerfile: docker-ojs/inference/Dockerfile
    container_name: ojs_inference
    env_file:
      - ../.env
    environment:
      DB_HOST: ojs_db_journal
      DB_PORT: 3306
    volumes:
      - ./volumes/logs/modsecurity:/var/log/modsecurity:ro
      - ../src:/app/src
      - ./inference/main.py:/app/main.py
    networks:
      - inside
    depends_on:
      - waf
      - db
    restart: unless-stopped
